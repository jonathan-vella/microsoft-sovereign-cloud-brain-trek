<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 360" role="img" aria-label="Sovereign cloud, edge, and datacenter architecture">
  <defs>
    <linearGradient id="bgGrad" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#F7FAFD"/>
      <stop offset="100%" stop-color="#E6F2FD"/>
    </linearGradient>
    <linearGradient id="cloudGrad" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#2886DE"/>
      <stop offset="100%" stop-color="#0F6CBD"/>
    </linearGradient>
    <linearGradient id="edgeGrad" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#3FAB3F"/>
      <stop offset="100%" stop-color="#107C10"/>
    </linearGradient>
    <linearGradient id="dcGrad" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#FFB845"/>
      <stop offset="100%" stop-color="#FF8C00"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="480" height="360" rx="12" fill="url(#bgGrad)"/>

  <!-- Subtle grid lines -->
  <g stroke="#CFE3F6" stroke-width="0.5" opacity="0.5">
    <line x1="0" y1="90" x2="480" y2="90"/>
    <line x1="0" y1="180" x2="480" y2="180"/>
    <line x1="0" y1="270" x2="480" y2="270"/>
    <line x1="120" y1="0" x2="120" y2="360"/>
    <line x1="240" y1="0" x2="240" y2="360"/>
    <line x1="360" y1="0" x2="360" y2="360"/>
  </g>

  <!-- Connecting orbits -->
  <path d="M 110 95 C 180 60, 300 60, 380 95" stroke="#0F6CBD" stroke-width="1.5" stroke-dasharray="4 4" fill="none" opacity="0.55"/>
  <path d="M 110 210 C 200 180, 300 180, 380 210" stroke="#107C10" stroke-width="1.5" stroke-dasharray="4 4" fill="none" opacity="0.55"/>
  <path d="M 110 95 C 110 200, 380 100, 380 210" stroke="#FF8C00" stroke-width="1.5" stroke-dasharray="4 4" fill="none" opacity="0.4"/>

  <!-- Cloud (top-left) -->
  <g transform="translate(60,40)">
    <ellipse cx="60" cy="56" rx="46" ry="6" fill="#CFE3F6" opacity="0.7" filter="url(#soft)"/>
    <path d="M 25 50 C 5 50, 5 25, 30 28 C 32 12, 60 8, 70 22 C 90 18, 100 32, 95 45 C 110 48, 110 60, 90 60 L 30 60 C 15 60, 15 50, 25 50 Z"
          fill="url(#cloudGrad)" stroke="#0C3B5E" stroke-width="1.5"/>
    <text x="60" y="82" text-anchor="middle" font-family="Inter Variable, Segoe UI, sans-serif" font-weight="600" font-size="13" fill="#0C3B5E">Sovereign Cloud</text>
  </g>

  <!-- Edge (top-right) -->
  <g transform="translate(320,40)">
    <ellipse cx="60" cy="56" rx="38" ry="5" fill="#B8E0B8" opacity="0.7" filter="url(#soft)"/>
    <rect x="32" y="20" width="56" height="40" rx="5" fill="url(#edgeGrad)" stroke="#0B6A0B" stroke-width="1.5"/>
    <circle cx="44" cy="32" r="2.5" fill="#fff"/>
    <circle cx="54" cy="32" r="2.5" fill="#fff" opacity="0.6"/>
    <rect x="40" y="42" width="40" height="3" rx="1" fill="#fff" opacity="0.85"/>
    <rect x="40" y="48" width="28" height="3" rx="1" fill="#fff" opacity="0.65"/>
    <text x="60" y="82" text-anchor="middle" font-family="Inter Variable, Segoe UI, sans-serif" font-weight="600" font-size="13" fill="#0B6A0B">Edge / Azure Local</text>
  </g>

  <!-- Datacenter (bottom-center) -->
  <g transform="translate(180,180)">
    <ellipse cx="60" cy="92" rx="58" ry="6" fill="#FFE0B3" opacity="0.7" filter="url(#soft)"/>
    <rect x="18" y="20" width="84" height="68" rx="6" fill="url(#dcGrad)" stroke="#8C5300" stroke-width="1.5"/>
    <g fill="#fff" opacity="0.9">
      <rect x="26" y="28" width="68" height="6" rx="1"/>
      <rect x="26" y="38" width="68" height="6" rx="1"/>
      <rect x="26" y="48" width="68" height="6" rx="1"/>
      <rect x="26" y="58" width="68" height="6" rx="1"/>
      <rect x="26" y="68" width="68" height="6" rx="1"/>
      <rect x="26" y="78" width="68" height="6" rx="1"/>
    </g>
    <g fill="#107C10">
      <circle cx="30" cy="31" r="1.2"/>
      <circle cx="30" cy="41" r="1.2"/>
      <circle cx="30" cy="51" r="1.2"/>
      <circle cx="30" cy="61" r="1.2"/>
      <circle cx="30" cy="71" r="1.2"/>
      <circle cx="30" cy="81" r="1.2"/>
    </g>
    <text x="60" y="110" text-anchor="middle" font-family="Inter Variable, Segoe UI, sans-serif" font-weight="600" font-size="13" fill="#5C4400">Regulated Datacenter</text>
  </g>

  <!-- Shield (zero-trust marker) -->
  <g transform="translate(40,210)">
    <path d="M 30 0 L 56 10 L 56 30 C 56 48, 42 60, 30 64 C 18 60, 4 48, 4 30 L 4 10 Z"
          fill="#fff" stroke="#0F6CBD" stroke-width="2"/>
    <path d="M 18 32 L 27 41 L 44 22" stroke="#0F6CBD" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="30" y="84" text-anchor="middle" font-family="Inter Variable, Segoe UI, sans-serif" font-weight="600" font-size="12" fill="#0C3B5E">Zero Trust</text>
  </g>

  <!-- AI spark (top-right corner) -->
  <g transform="translate(420,250)">
    <path d="M 16 0 L 20 12 L 32 16 L 20 20 L 16 32 L 12 20 L 0 16 L 12 12 Z" fill="#FF8C00" opacity="0.9"/>
    <text x="16" y="50" text-anchor="middle" font-family="Inter Variable, Segoe UI, sans-serif" font-weight="600" font-size="12" fill="#5C4400">Edge RAG</text>
  </g>
</svg>
