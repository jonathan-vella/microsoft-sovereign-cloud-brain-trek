# Vale configuration — docs review pipeline
# Plan reference: §E "Vale rule curation"
# Mode: warning-only (Phase 5 gate is severity≥error == 0). Curated to keep
# noise ratio ≤ 5 findings per 1000 words. See pilot-results.md for measurements.

StylesPath = .vale/styles
MinAlertLevel = warning

# Microsoft style package (synced via `vale sync`)
Packages = Microsoft

# Vocabulary lives at .vale/styles/config/vocabularies/SovereignCloud/
Vocab = SovereignCloud

[*.md]
BasedOnStyles = Vale, Microsoft

# --- Suppressed rules (rationale captured per §E) ---
# Voice / phrasing rules that contradict project sales-and-training tone:
Microsoft.Contractions       = NO
Microsoft.We                 = NO
Microsoft.FirstPerson        = NO
Microsoft.Adverbs-ly         = NO
Microsoft.Wordiness          = NO
Microsoft.Negative           = NO
Microsoft.Passive            = NO
Microsoft.SentenceLength     = NO
Microsoft.OxfordComma        = NO

# Punctuation / formatting rules that fight project markdown style:
Microsoft.Dashes             = NO    # project uses spaced em-dashes intentionally
Microsoft.HeadingPunctuation = NO    # ":" in headings is allowed (e.g. "Module 4: ...")
Microsoft.Headings           = NO    # title-case is intentional in many headings

# Vocab/terms rules — project glossary is authoritative; SovereignCloud vocab covers
# the product-name surface area. Microsoft.Vocab fights our product names.
Microsoft.Vocab              = NO
Microsoft.Terms              = NO    # absurd false positives (e.g., "agent" → "personal digital assistant")

# Capitalization rules: project intentionally uses both "Arc-enabled" and "Arc-Enabled"
# (the latter in some section headings). Sweep is tracked in Phase 2.4, not Vale.
Vale.Terms                   = NO

# Spelling: SovereignCloud vocab is the source of truth. Vale.Spelling is too noisy
# on technical product names; suppress globally and rely on vocab + manual review.
Vale.Spelling                = NO

# Phase 1 audit demotions (WONTFIX WX-001 / WX-002):
# Project consistently uses hyphenated forms ("auto-failover", "auto-renew",
# "auto-classification") aligned with Azure documentation conventions.
Microsoft.Auto               = warning
# "Backend" is standard Azure terminology (e.g., Azure Front Door backend pool).
Microsoft.Avoid              = warning

# Active rules (severity≥error gates Phase 5):
# Microsoft.Acronyms             — define acronyms on first use
# Microsoft.GeneralURL           — link-text quality (no "click here")
# Microsoft.Quotes               — straight quotes
# Microsoft.Spacing              — single space after period
# Microsoft.Units                — SI units
# Vale.Repetition                — duplicated words ("the the")
# Vale.Avoid                     — banned terms (configurable; empty by default)
