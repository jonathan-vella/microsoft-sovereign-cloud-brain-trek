name: Deploy Astro Site to GitHub Pages

# Phase 6 cutover — this workflow now owns the live production deployment.
# The previous Jekyll workflow has been renamed to `jekyll-deploy.yml.disabled`
# so it cannot race with this one. To roll back, follow the runbook in
# CONTRIBUTING.md (`## Rollback runbook`).

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - ".github/workflows/astro-deploy.yml"
  workflow_dispatch:
    inputs:
      reason:
        description: "Why are you running this manually?"
        required: false
        default: "manual redeploy"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "astro-pages"
  cancel-in-progress: false

defaults:
  run:
    working-directory: site

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Astro site
        run: npm run build

      - name: Emit legacy .html redirect stubs
        # Phase 5.2 — preserve every legacy Jekyll URL via static stubs in
        # dist/ that meta-refresh to the new clean slug and carry a
        # canonical link for search engines.
        run: npm run emit-legacy-stubs

      - name: Setup Pages
        # Phase 6 cutover — this workflow now drives the GitHub Pages
        # deployment source. `enablement: true` ensures Pages is on for
        # the repository (idempotent; no-op if already configured).
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site/dist

  deploy:
    # Phase 6 cutover — deploy to the live `github-pages` environment.
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
